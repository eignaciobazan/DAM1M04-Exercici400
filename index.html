<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <link rel="stylesheet" href="estils.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;600;800&display=swap" rel="stylesheet" />
    <script src="script.js" defer></script>
    <title>Javascript DOM</title>

  <body>
    <section class="contadorpuzzle">
      <div class="tabla" id="puzzle">
        <img src="imatges/7.png" data-index="0" class="cuadrito" alt="7">
        <img src="imatges/1.png" data-index="1" class="cuadrito" alt="1">
        <img src="imatges/3.png" data-index="2" class="cuadrito" alt="3">
        <img src="imatges/9.jpg" data-index="3" class="cuadrito empty" alt="9">
        <img src="imatges/2.png" data-index="4" class="cuadrito" alt="2">
        <img src="imatges/5.png" data-index="5" class="cuadrito" alt="5">
        <img src="imatges/4.png" data-index="6" class="cuadrito" alt="4">

      <div class="contador">
        <p id="count">Movimientos:0</p>
      </div>

    </section>


    <div style="text-align:center; margin-top:1rem;">
      <button id="shuffleBtn">Mezclar</button>
      <button id="resetBtn">Reiniciar</button>
    <p id="message"></p>
    </div>
